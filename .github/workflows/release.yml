name: Release — Docker Build & Push

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ github.event.inputs.tag }}
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"
      
      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sandboxai-api:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/sandboxai-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Worker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sandboxai-worker:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/sandboxai-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sandboxai-frontend:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/sandboxai-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline ${TAG} -- | head -20)
          else
            CHANGELOG=$(git log --oneline ${PREV_TAG}..${TAG} | head -20)
          fi
          
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          echo "changelog=${CHANGELOG}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🐳 Docker Images Published
            
            ### Images
            - `${{ secrets.DOCKER_USERNAME }}/sandboxai-api:${{ github.ref_name }}`
            - `${{ secrets.DOCKER_USERNAME }}/sandboxai-worker:${{ github.ref_name }}`
            - `${{ secrets.DOCKER_USERNAME }}/sandboxai-frontend:${{ github.ref_name }}`
            
            ### Changes
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```
            
            ## 📦 Installation
            
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/sandboxai-api:${{ github.ref_name }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/sandboxai-worker:${{ github.ref_name }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/sandboxai-frontend:${{ github.ref_name }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify Slack (optional)
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 SandboxAI Release ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *SandboxAI released* — ${{ github.ref_name }}\n\nDocker images pushed to Docker Hub."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
