name: CI — Tests & Linting

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'package.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'package.json'

jobs:
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pytest pytest-asyncio pytest-cov httpx groq
          cd backend && pip install -r requirements.txt
      
      - name: Format check with black
        run: |
          black --check backend/app --line-length=100
      
      - name: Import sort check with isort
        run: |
          isort --check-only backend/app
      
      - name: Lint with flake8
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_sandboxai
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-env
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_sandboxai
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          DEBUG: false
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint-frontend:
    name: Lint Frontend (TypeScript/React)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        run: cd frontend && npm ci
      
      - name: Lint with ESLint
        run: cd frontend && npm run lint || true
      
      - name: Type check with TypeScript
        run: cd frontend && npm run type-check || true
      
      - name: Build frontend
        run: cd frontend && npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security-focused linting
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r backend/app -f json -o /tmp/bandit-report.json || true
          cat /tmp/bandit-report.json | python -m json.tool || echo "No issues found"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend, docker-build, security-check]
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          echo "🔍 CI Pipeline Results:"
          echo "- Backend Linting: ${{ needs.lint-backend.result }}"
          echo "- Backend Tests: ${{ needs.test-backend.result }}"
          echo "- Frontend Linting: ${{ needs.lint-frontend.result }}"
          echo "- Docker Build: ${{ needs.docker-build.result }}"
          echo "- Security Check: ${{ needs.security-check.result }}"
          
          if [ "${{ needs.lint-backend.result }}" != "success" ] || \
             [ "${{ needs.test-backend.result }}" != "success" ] || \
             [ "${{ needs.lint-frontend.result }}" != "success" ] || \
             [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          
          echo "✅ CI Pipeline Passed"
